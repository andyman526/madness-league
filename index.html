<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>March Madness Fantasy 2026</title>
<style>
body { font-family:-apple-system,sans-serif; background:#f2f2f7; margin:0; padding:0;}
header { text-align:center; padding:15px; background:#fff; font-weight:bold; font-size:1.2em;}
.container { padding:10px;}
select,input { margin:5px 0; width:100%; padding:8px;}
table { width:100%; border-collapse:collapse; margin:10px 0;}
th,td { border:1px solid #ddd; padding:5px; text-align:center;}
th { background:#eee;}
button { padding:10px; margin:10px 0; width:100%; font-weight:bold; background:#007aff; color:white; border:none; border-radius:5px;}
.player-section {border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:5px; background:#fff;}
.collapse-btn {background:#eee;color:#000;padding:5px;width:100%;border:none;border-radius:3px;margin-bottom:5px;}
.win {color:green;} .lose {color:red;}
</style>
</head>
<body>
<header>March Madness Fantasy 2026</header>
<div class="container">

<h3>Add Player</h3>
<input type="text" id="playerName" placeholder="Player Name">
<button onclick="addPlayer()">Add Player</button>

<h3>Draft Teams</h3>
<div id="playersDrafts"></div>

<h3>Enter Tournament Results</h3>
<div id="results"></div>
<button onclick="calculateScores()">Calculate Scores</button>

<h3>Leaderboard</h3>
<table id="leaderboard">
<thead><tr><th>Player</th><th>Points</th></tr></thead>
<tbody></tbody>
</table>
</div>

<script>
// ======================== CONFIG ========================
const seeds = Array.from({length:16},(_,i)=>i+1);
const regions = {
"East":["Duke","UConn","Michigan State","Kansas","St. John's","Louisville","UCLA","Ohio State","TCU","UCF","South Florida","Northern Iowa","California Baptist","North Dakota State","Furman","Siena"],
"Midwest":["Michigan","Iowa State","Virginia","Alabama","Texas Tech","Tennessee","Kentucky","Georgia","Saint Louis","Santa Clara","Miami (OH)/SMU","Akron","Hofstra","Wright State","Tennessee State","UMBC/Howard"],
"South":["Florida","Houston","Illinois","Nebraska","Vanderbilt","North Carolina","Saint Mary's","Clemson","Iowa","Texas A&M","VCU","McNeese","Troy","Penn","Idaho","Prairie View A&M/Lehigh"],
"West":["Arizona","Purdue","Gonzaga","Arkansas","Wisconsin","BYU","Miami (FL)","Villanova","Utah State","Missouri","Texas/NC State","High Point","Hawai’i","Kennesaw State","Queens","Long Island (LIU)"]
};
const seedValues={1:1,2:1.5,3:2,4:2.5,5:3,6:3.5,7:4,8:4.5,9:5,10:5.5,11:6,12:6.5,13:7,14:7.5,15:8,16:9};
const roundMultipliers={R64:1,R32:2,S16:4,E8:8,F4:16,Title:24};

// ======================== STATE ========================
let players={};
let results={};

// ======================== LOCAL STORAGE ========================
function saveToStorage(){localStorage.setItem("mmPlayers",JSON.stringify(players));localStorage.setItem("mmResults",JSON.stringify(results));}
function loadFromStorage(){const p=localStorage.getItem("mmPlayers");if(p)players=JSON.parse(p);const r=localStorage.getItem("mmResults");if(r)results=JSON.parse(r);renderPlayers();renderResults();}

// ======================== UI ========================
function addPlayer(){
const name=document.getElementById("playerName").value.trim();
if(!name)return alert("Enter a name!");if(players[name])return alert("Player exists!");
players[name]={};
renderPlayers();
saveToStorage();
}

function renderPlayers(){
const container=document.getElementById("playersDrafts");
container.innerHTML="";
for(let player in players){
let div=document.createElement("div");
div.className="player-section";
let html=`<button class="collapse-btn" onclick="toggleDraft('${player}')">${player}'s Draft</button><div id="draftDiv_${player}" style="display:none;">`;
seeds.forEach(s=>{
html+=`<label>Seed ${s}:</label><select id="draft_${player}_${s}">`;
for(let r in regions){html+=`<optgroup label="${r}">`;html+=regions[r].map(team=>`<option value="${team}">${team}</option>`).join("");html+="</optgroup>";}
html+=`</select><br>`;
});
html+=`<button onclick="saveDraft('${player}')">Save Draft</button></div>`;
div.innerHTML=html;
container.appendChild(div);
}
}

function toggleDraft(player){
const d=document.getElementById(`draftDiv_${player}`);
d.style.display=d.style.display==="none"?"block":"none";
}

function saveDraft(player){
seeds.forEach(s=>{players[player][s]=document.getElementById(`draft_${player}_${s}`).value;});
alert(`${player}'s draft saved!`);
saveToStorage();
renderResults();
}

// ======================== RESULTS UI ========================
function renderResults(){
const resultsDiv=document.getElementById("results");
resultsDiv.innerHTML="";
const rounds=["R64","R32","S16","E8","F4","Title"];
seeds.forEach(s=>{results[s]||(results[s]={});rounds.forEach(r=>{
results[s][r]||(results[s][r]="");
resultsDiv.innerHTML+=`<label>${s} Seed (${r}):</label><select id="res_${s}_${r}"><option value="">--Select--</option><option value="win">Win</option><option value="lose">Lose</option></select><br>`;
});});
}

// ======================== SCORING ========================
function calculateScores(){
const leaderboard=[];
for(let player in players){
let total=0;
seeds.forEach(s=>{
const seedVal=seedValues[s];
let prevWin=true;
let lastWinnerSeed=s;
for(let r in results[s]){
const sel=document.getElementById(`res_${s}_${r}`).value;
if(!prevWin)break;
if(sel==="win"){
let points=seedVal*roundMultipliers[r];
// Upset kicker
if(r==="R64"||r==="R32"){
const diff=Math.abs(s-lastWinnerSeed);
if(diff>=3){
if(s>lastWinnerSeed){points+=r==="R64"?diff:diff*0.5;}
else if(s<lastWinnerSeed){points-=r==="R64"?diff:diff*0.5;}
}
}
total+=points;
lastWinnerSeed=s;
prevWin=true;
}else if(sel==="lose"){prevWin=false;}
}
});
leaderboard.push({player,total});
}
// sort
leaderboard.sort((a,b)=>b.total-a.total);
const tbody=document.querySelector("#leaderboard tbody");
tbody.innerHTML=leaderboard.map(p=>`<tr><td>${p.player}</td><td>${p.total}</td></tr>`).join("");
saveToStorage();
}

// ======================== INIT ========================
loadFromStorage();
</script>
</body>
</html>
