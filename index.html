<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>March Madness Fantasy 2026</title>
<style>
body { font-family:-apple-system,sans-serif; background:#f2f2f7; margin:0; padding:0;}
header { text-align:center; padding:15px; background:#fff; font-weight:bold; font-size:1.3em; }
.container { padding:10px; max-width:600px; margin:auto; }
input,select { padding:8px;margin:5px 0;width:100%; font-size:1em; }
button { padding:10px; margin:5px 0; width:100%; font-weight:bold; border:none; border-radius:5px; font-size:1em; }
.team-btn { background:#007aff; color:white; font-size:1em; margin:3px; border-radius:5px; }
.team-btn.selected { background:#34c759; }
.player-section {border:1px solid #ccc; padding:10px; margin-bottom:10px; border-radius:5px; background:#fff;}
.collapse-btn {background:#eee;color:#000;padding:5px;width:100%;border:none;border-radius:3px;margin-bottom:5px;}
.win {color:green;} .lose {color:red;}
.undo-btn {background:#ff3b30; color:white; margin-top:5px;}
</style>
</head>
<body>
<header>March Madness Fantasy 2026</header>
<div class="container">

<h3>Add Player</h3>
<input type="text" id="playerName" placeholder="Your Name">
<button onclick="addPlayer()">Add Player</button>
<button onclick="quickPick()">Quick Pick</button>

<div id="draftSection" style="display:none;">
<h3 id="seedTitle"></h3>
<div id="teamButtons"></div>
<button class="undo-btn" onclick="undoPick()">Undo Last Pick</button>
</div>

<div id="summarySection" style="display:none;">
<h3>Draft Summary</h3>
<div id="summaryList"></div>
<button onclick="confirmDraft()">Confirm Draft</button>
</div>

<h3>Enter Tournament Results</h3>
<div id="results"></div>

<h3>Leaderboard</h3>
<table id="leaderboard">
<thead><tr><th>Player</th><th>Points</th></tr></thead>
<tbody></tbody>
</table>

</div>

<script>
// ================== CONFIG ==================
const seeds = Array.from({length:16},(_,i)=>i+1);
const regions = {
"East":["Duke","UConn","Michigan State","Kansas","St. John's","Louisville","UCLA","Ohio State","TCU","UCF","South Florida","Northern Iowa","California Baptist","North Dakota State","Furman","Siena"],
"Midwest":["Michigan","Iowa State","Virginia","Alabama","Texas Tech","Tennessee","Kentucky","Georgia","Saint Louis","Santa Clara","Miami (OH)/SMU","Akron","Hofstra","Wright State","Tennessee State","UMBC/Howard"],
"South":["Florida","Houston","Illinois","Nebraska","Vanderbilt","North Carolina","Saint Mary's","Clemson","Iowa","Texas A&M","VCU","McNeese","Troy","Penn","Idaho","Prairie View A&M/Lehigh"],
"West":["Arizona","Purdue","Gonzaga","Arkansas","Wisconsin","BYU","Miami (FL)","Villanova","Utah State","Missouri","Texas/NC State","High Point","Hawai’i","Kennesaw State","Queens","Long Island (LIU)"]
};
const seedValues={1:1,2:1.5,3:2,4:2.5,5:3,6:3.5,7:4,8:4.5,9:5,10:5.5,11:6,12:6.5,13:7,14:7.5,15:8,16:9};
const roundMultipliers={R64:1,R32:2,S16:4,E8:8,F4:16,Title:24};
const rounds=["R64","R32","S16","E8","F4","Title"];

// ================== STATE ==================
let players={};
let currentPlayer="";
let currentSeedIndex=0;
let draftPicks={};
let draftHistory=[];
let results={};

// ================== STORAGE ==================
function saveToStorage(){
  localStorage.setItem("mmPlayers",JSON.stringify(players));
  localStorage.setItem("mmResults",JSON.stringify(results));
}
function loadFromStorage(){
  const p=localStorage.getItem("mmPlayers"); 
  if(p) players=JSON.parse(p);
  const r=localStorage.getItem("mmResults"); 
  if(r) results=JSON.parse(r);
  renderLeaderboard();
}
loadFromStorage();

// ================== DRAFT FLOW ==================
function addPlayer(){
  const name=document.getElementById("playerName").value.trim();
  if(!name){alert("Enter a name!"); return;}
  if(players[name]){alert("Player exists!"); return;}
  players[name]={};
  currentPlayer=name;
  draftPicks={};
  draftHistory=[];
  currentSeedIndex=0;
  document.getElementById("draftSection").style.display="block";
  document.getElementById("summarySection").style.display="none";
  showSeed();
}

function showSeed(){
  if(currentSeedIndex>=seeds.length){showSummary(); return;}
  const seed=seeds[currentSeedIndex];
  document.getElementById("seedTitle").innerText=`${currentPlayer} - Pick a team for Seed ${seed}`;
  const btnDiv=document.getElementById("teamButtons");
  btnDiv.innerHTML="";
  const teams=Object.values(regions).map(r=>r[seed-1]);
  teams.forEach(team=>{
    const btn=document.createElement("button");
    btn.className="team-btn";
    btn.innerText=team;
    btn.onclick=()=>selectTeam(seed,team,btn);
    btnDiv.appendChild(btn);
  });
}

function selectTeam(seed,team,btn){
  draftPicks[seed]=team;
  draftHistory.push(seed);
  Array.from(document.querySelectorAll(".team-btn")).forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  setTimeout(()=>{currentSeedIndex++; showSeed();},300);
}

function undoPick(){
  if(draftHistory.length===0){alert("No picks to undo."); return;}
  const lastSeed=draftHistory.pop();
  delete draftPicks[lastSeed];
  currentSeedIndex=lastSeed-1;
  showSeed();
}

function quickPick(){
  const name=document.getElementById("playerName").value.trim();
  if(!name){alert("Enter a name!"); return;}
  players[name]={};
  draftPicks={};
  seeds.forEach(s=>{
    const teams=Object.values(regions).map(r=>r[s-1]);
    draftPicks[s]=teams[Math.floor(Math.random()*teams.length)];
  });
  players[name]={...draftPicks};
  saveToStorage();
  alert(`${name} Quick Pick complete!`);
  renderLeaderboard();
}

// ================== SUMMARY ==================
function showSummary(){
  document.getElementById("draftSection").style.display="none";
  document.getElementById("summarySection").style.display="block";
  const summaryDiv=document.getElementById("summaryList");
  summaryDiv.innerHTML="";
  seeds.forEach(s=>{
    const p=document.createElement("p");
    p.innerText=`Seed ${s}: ${draftPicks[s]}`;
    summaryDiv.appendChild(p);
  });
}

function confirmDraft(){
  players[currentPlayer]={...draftPicks};
  saveToStorage();
  alert(`${currentPlayer}'s draft confirmed!`);
  document.getElementById("summarySection").style.display="none";
  renderLeaderboard();
}

// ================== RESULTS ENTRY ==================
function renderResults(){
  const resultsDiv=document.getElementById("results");
  resultsDiv.innerHTML="";
  seeds.forEach(s=>{
    results[s]||(results[s]={});
    rounds.forEach(r=>{
      results[s][r]||(results[s][r]="");
      const select=document.createElement("select");
      select.id=`res_${s}_${r}`;
      const opt1=document.createElement("option");
      opt1.value=""; opt1.innerText="--Select--";
      const opt2=document.createElement("option");
      opt2.value="win"; opt2.innerText="Win";
      const opt3=document.createElement("option");
      opt3.value="lose"; opt3.innerText="Lose";
      select.append(opt1,opt2,opt3);
      select.value=results[s][r];
      select.onchange=()=>{results[s][r]=select.value; calculateScores();};
      const label=document.createElement("label");
      label.innerText=`Seed ${s} (${r}): `;
      resultsDiv.appendChild(label);
      resultsDiv.appendChild(select);
      resultsDiv.appendChild(document.createElement("br"));
    });
  });
}
renderResults();

// ================== SCORING ==================
function calculateScores(){
  const leaderboard=[];
  for(let player in players){
    let total=0;
    seeds.forEach(s=>{
      const seedVal=seedValues[s];
      let prevWin=true;
      let lastWinnerSeed=s;
      rounds.forEach(r=>{
        if(!prevWin) return;
        const sel=results[s][r];
        if(sel==="win"){
          let points=seedVal*roundMultipliers[r];
          const diff=Math.abs(s-lastWinnerSeed);
          if(diff>=3){
            if(s>lastWinnerSeed){points+=r==="R64"?diff:diff*0.5;}
            else if(s<lastWinnerSeed){points-=r==="R64"?diff:diff*0.5;}
          }
          total+=points;
          lastWinnerSeed=s;
          prevWin=true;
        } else if(sel==="lose"){ prevWin=false; }
      });
    });
    leaderboard.push({player,total});
  }
  leaderboard.sort((a,b)=>b.total-a.total);
  const tbody=document.querySelector("#leaderboard tbody");
  tbody.innerHTML=leaderboard.map(p=>`<tr><td>${p.player}</td><td>${p.total}</td></tr>`).join("");
  saveToStorage();
}

// ================== LEADERBOARD ==================
function renderLeaderboard(){
  const tbody=document.querySelector("#leaderboard tbody");
  tbody.innerHTML="";
  for(let player in players){
    tbody.innerHTML+=`<tr><td>${player}</td><td>0</td></tr>`;
  }
}
</script>
</body>
</html>
